language:
  name: Chinese

data:
  splits:
    train: Chinese/train.csv
    validation: Chinese/validation.csv
    test: Chinese/test.csv
  max_length: 128

model:
  backbone: hfl/chinese-roberta-wwm-ext
  num_attention_heads: 8
  dropout: 0.1
  use_label_queries: true
  use_static_graph: true
  use_dynamic_dependency: true

loss:
  classification: weighted_bce
  asymmetric_gamma_neg: 4.0
  asymmetric_gamma_pos: 1.0
  asymmetric_clip: 0.05
  lambda_ranking: 0.2
  lambda_calibration: 0.1
  ranking_margin: 0.2
  calibration_gamma: 2.0

training:
  seed: 42
  epochs: 5
  batch_size: 16
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  gradient_clip_norm: 1.0
  mixed_precision: true
  early_stopping_patience: 3
  monitor_metric: macro_f1
  num_workers: 0

calibration:
  enabled: true
  max_iter: 100
  learning_rate: 1.0

inference:
  threshold_mode: tuned
  fixed_threshold: 0.5
